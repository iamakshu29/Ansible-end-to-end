# Step 1 & 2 - Print hostnames (used to test forks and pipelining)
# Change forks in ansible.cfg to 1 then 4 and compare run output
# ansible-playbook -i inventory/static/inventory.yml -i inventory/dynamic/constructed.yml 03_performance_tuning.yml
- name: Step 1+2 - Print hostnames (forks and pipelining demo)
  hosts: all
  gather_facts: true
  tasks:
    - name: Print Hostnames
      debug:
        msg: "Hostname : {{ inventory_hostname }}"
    - name: Print Group Names
      debug:
        msg: "Group Names : {{ group_names }}"
    - name: Print environment_label
      debug:
        msg: "Environment Label : {{ environment_label }}"

# Step 3 - gather_facts: false
# Notice: the 'Gathering Facts' task is completely absent from the output for this play
- name: Step 3 - Same tasks with gather_facts disabled
  hosts: all
  gather_facts: false
  tasks:
    - name: Print Hostnames
      debug:
        msg: "Hostname : {{ inventory_hostname }}"
    - name: Print Group Names
      debug:
        msg: "Group Names : {{ group_names }}"
    - name: Print environment_label
      debug:
        msg: "Environment Label : {{ environment_label }}"

# Step 4 - gather_subset
# KNOWN LIMITATION: gather_subset does NOT work with ansible_connection: local
# in Ansible 2.10. The local connection module bypasses subset filtering entirely,
# so all facts are always collected regardless of what subsets you specify.
#
# On real SSH hosts this works correctly — network-only subset collects ~20 facts
# vs ~100+ for a full gather, which is a significant speed improvement at scale.
#
# The correct syntax to use on real hosts:
- name: Step 4 - gather_subset (syntax reference — no visible effect on local connection)
  hosts: all
  gather_facts: false
  tasks:
    - name: Collect only network facts (works on SSH hosts, ignored on local)
      setup:
        gather_subset:
          - "!all"
          - "!min"
          - network

    - name: Show fact count (will equal full gather count on local connection)
      debug:
        msg: "Facts collected: {{ ansible_facts | length }} (on SSH hosts this would be ~20 instead of ~100)"

