- name: Play 1 - roles syntax
  hosts: localhost
  roles:
    - webserver

- name: Play 2 - import_role (static, tags pass to inner tasks)
  hosts: localhost
  tasks:
    - name: Calling webserver role using import_role — pass http_port via task vars
      import_role:
        name: webserver
      vars:
        http_port: 9090           # overrides defaults/main.yml — proof: install task prints 9090
      tags: [import]
      # Tags pass through to every inner task because import_role is resolved at parse time
      # --tags import reaches install.yml, configure.yml tasks inside the role

- name: Play 3 - include_role (dynamic, tags do NOT reach inner tasks)
  hosts: localhost
  tasks:
    - name: Calling webserver role using include_role
      include_role:
        name: webserver
      tags: [include]
      # Tags stay on this task only — inner tasks have no tag, so --tags include skips them
      # To filter inner tasks of include_role, put tags: inside the role files directly

- name: Play 4 - loop with include_role
  hosts: localhost
  tasks:
    - name: Looping over include_role with role names
      include_role:
        name: "{{ item }}"
      loop: [webserver, common]

