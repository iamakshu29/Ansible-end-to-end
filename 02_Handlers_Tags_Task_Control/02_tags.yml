- name: How tags work
  hosts: localhost
  become: false
  gather_facts: false
  tasks:
    - name: "INSTALL | Install package A"
      debug:
        msg: "Installing package A"
      tags:
        - install

    - name: "INSTALL | Install package B"
      debug:
        msg: "Installing package B"
      tags:
        - install

    - name: "CONFIGURE | Configure service A"
      debug:
        msg: "Configuring service A"
      tags:
        - configure

    - name: "CONFIGURE | Configure service B"
      debug:
        msg: "Configuring service B"
      tags:
        - configure

    - name: "DEBUG | Debug info (tagged never — skipped by default)"
      debug:
        msg: "This only runs when explicitly requested with --tags debug or --tags never"
      tags:
        - debug
        - never

    - name: "ALWAYS | This task always runs regardless of tags"
      debug:
        msg: "This runs even when filtering by --tags install or --skip-tags configure"
      tags:
        - always

## Run playbook taks tagged with tag -install
# ansible-playbook 02_tags.yml --tags install

## Run all playbook tasks except tagged with tag -configure
# ansible-playbook 02_tags.yml --tags install

## Run playbook taks tagged with tag -debug
# ansible-playbook 02_tags.yml --tags debug

## Run playbook taks tagged with tag -never
# ansible-playbook 02_tags.yml --tags never

## Run command to list all tasks
# ansible-playbook 02_tags.yml --list-tasks
