- name: Mini Project — Controlled App Setup with tags, handlers, loops, when, block/rescue/always
  hosts: localhost
  become: false
  gather_facts: false

  vars:
    file_and_cont:
      - name: "file_a"
        content: "Hi this is content of file_a"
      - name: "file_b"
        content: "Hi this is content of file_b"
      - name: "file_c"
        content: "Hi this is content of file_c"
      - name: "file_d"
        content: "Hi this is content of file_d"

    # Set to "true" (string) to run the deploy block
    # or pass via CLI: -e "deploy_enabled=true"
    deploy_enabled: false

  tasks:

    # ---------------------------------------------------------------
    # SECTION 1: INSTALL — run with --tags install
    # Tags on the block apply to both tasks inside — no need to repeat per task
    # ---------------------------------------------------------------
    - name: "INSTALL BLOCK | Install application packages"
      block:
        - name: "INSTALL | Install package A"
          debug:
            msg: "Installing package A"

        - name: "INSTALL | Install package B"
          debug:
            msg: "Installing package B"
      tags:
        - install

    # ---------------------------------------------------------------
    # SECTION 2: CONFIGURE — run with --tags configure
    # Uses include_tasks to pull configure_tasks.yml at runtime (dynamic)
    # Tasks inside configure_tasks.yml notify the handler defined below
    # ---------------------------------------------------------------
    - name: "CONFIGURE BLOCK | Load configure tasks from external file"
      block:
        - name: "CONFIGURE | Load configure tasks via include_tasks"
          include_tasks: tasks/configure_tasks.yml
      tags:
        - configure

    # flush_handlers ensures the service restart happens BEFORE deploy starts
    - name: "FLUSH | Run pending handlers now — service restart before deploy"
      meta: flush_handlers

    # ---------------------------------------------------------------
    # SECTION 3: DEPLOY — run with --tags deploy
    # Gated by when: deploy_enabled == "true" — skipped if false (default)
    # block/rescue/always handles errors — always prints completion status
    # until: on health check retries up to 3 times before failing
    # ---------------------------------------------------------------
    - name: "DEPLOY BLOCK | Deploy with health check and error handling"
      block:
        - name: "DEPLOY | Deploy package"
          debug:
            msg: "Deploying package from files"

        - name: "DEPLOY | Health check — retries until /tmp/file_a exists"
          command: test -f /tmp/file_a
          register: health_check
          until: health_check.rc == 0
          retries: 3
          delay: 5

      rescue:
        - name: "RESCUE | Print which deploy task failed"
          debug:
            msg: "Deploy failed at task: '{{ ansible_failed_task.name }}'"

      always:
        - name: "ALWAYS | Confirm deploy attempt finished"
          debug:
            msg: "Deploy attempt finished"

      tags:
        - deploy
      when: deploy_enabled == "true"

    # ---------------------------------------------------------------
    # STRETCH: Debug variable dump — tagged 'never', skipped by default
    # Run with --tags debug to activate
    # Loops over file_and_cont list — one iteration per dict item
    # loop_control label keeps output clean (shows name only, not full dict)
    # ---------------------------------------------------------------
    - name: "STRETCH | Print all variables (tagged never — run with --tags debug)"
      debug:
        msg:
          - "Name: {{ item.name }} | Content: {{ item.content }}"
          - "deploy_enabled = {{ deploy_enabled }}"
      loop: "{{ file_and_cont }}"
      loop_control:
        label: "{{ item.name }}"
      tags:
        - never
        - debug

  handlers:
    - name: Restart Service
      debug:
        msg: "Handler fired — App Service would restart here in a real playbook"

## Commands
# ansible-playbook project_app_setup.yml --tags install
# ansible-playbook project_app_setup.yml --tags configure
# ansible-playbook project_app_setup.yml --tags deploy                           # skipped — deploy_enabled=false
# ansible-playbook project_app_setup.yml --tags deploy -e "deploy_enabled=true"  # runs deploy
# ansible-playbook project_app_setup.yml --tags debug                            # stretch goal