- name: Intro to handlers
  hosts: localhost
  become: false
  gather_facts: false
  vars:
  tasks:
    - name: Copy Content using copy Module.
      copy:
        src: files/sample_file.conf
        dest: /tmp/app.conf
      notify: Something is Updated
    
    - name: Just another task.
      debug:
        msg: Just another task message
      notify: Something is Updated

    # flush_handlers demo — forces pending handlers to run NOW, mid-play
    # Without this, "Something is Updated" only fires at the very end of the play.
    # With this, it fires here — before the next task runs.
    - name: Flush handlers mid-play
      meta: flush_handlers

    - name: Task after flush - handler already fired above
      debug:
        msg: "Handler ran before this task due to flush_handlers"

  handlers:
    - name: Something is Updated
      debug:
        msg: "Config changed - service would restart"

## Commands
# ansible-playbook 01_handlers.yml
# Comment out the flush_handlers task and compare — handler moves to end of play.