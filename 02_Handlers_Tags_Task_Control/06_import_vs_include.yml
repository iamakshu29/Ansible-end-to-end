- name: Tutorial on how to use import and include
  hosts: localhost
  become: false
  gather_facts: false
  vars:
    # task_file: deploy
  tasks:
    - name: Calling Install tasks
      import_tasks: tasks/install.yml
      tags: 
        - install
    
    - name: Calling Include tasks
      include_tasks: tasks/configure.yml
      tags: 
        - configure

    - name: Calling Include tasks
      include_tasks: "tasks/{{ task_file }}.yml"
      tags: 
        - deploy

### Commands & Results
# ansible-playbook 06_import_vs_include.yml --tags install
#   -> Runs tasks inside install.yml directly (import is static, tags pass through to inner tasks)
#
# ansible-playbook 06_import_vs_include.yml --tags configure
#   -> First includes the file at runtime, then runs tasks inside it
#
# ansible-playbook 06_import_vs_include.yml --tags deploy
#   -> Same as configure — include resolves the variable filename at runtime
#
# Note: import_tasks with a variable filename (task_file defined in vars:) did NOT error
#   because play-level vars are resolved at parse time — Ansible knows the filename before running.
#   The error only happens when the variable is a runtime value (fact, registered var, etc.)