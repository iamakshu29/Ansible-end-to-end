- name: This Playbook is provide tutorial on how to use Ansible Facts executed by gather_facts
  hosts: all
  become: true
  gather_facts: true
  vars:
  tasks:
    - name: "Get the OS Family"
      debug:
        msg: "OS Family: {{ ansible_facts['os_family'] }}"

    - name: "Get the Distribution"
      debug:
        msg: "Distribution: {{ ansible_facts['distribution'] }}"

    - name: "Get the default IPv4 address"
      debug:
        msg: "IP Address: {{ ansible_facts['default_ipv4']['address'] }}"

    - name: "Get the Total Memory in MB"
      debug:
        msg: "Total Memory: {{ ansible_facts['memtotal_mb'] }}"
    
    - name: "Get the Task using setup module"
      ansible.builtin.setup:
        filter: ansible_memory_mb

    - name: "Get the Task using setup module"
      debug:
        msg: "Total memory is {{ ansible_facts['memtotal_mb'] }} MB"

    # Break stuff on purpose — use a key that does not exist (will error) and handle it with default
    - name: "Fix - handle undefined fact key with default"
      debug:
        msg: "Made up key: {{ ansible_facts['made_up_key'] | default('unknown') }}"

# Try running ansible localhost -m setup
# ansible localhost -m setup