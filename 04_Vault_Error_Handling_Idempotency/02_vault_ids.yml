- name: Vault IDs Tutorial
  hosts: localhost
  tasks:
    - name: Load dev secrets
      include_vars: vars/dev_secrets.yml
      when: env == "dev"

    - name: Load prod secrets
      include_vars: vars/prod_secrets.yml
      when: env == "prod"

    - name: Print environment db url
      debug:
        msg: "DB URL: {{ environment_db_url }}"


# Only loads dev_secrets.yml → only needs dev vault password
# ansible-playbook 02_vault_ids.yml --vault-id dev@prompt -e env=dev

# Only loads prod_secrets.yml → only needs prod vault password
# ansible-playbook 02_vault_ids.yml --vault-id prod@prompt -e env=prod